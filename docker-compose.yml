
services:
  gazebo:
    image: nanosaur/simulation:gazebo
    container_name: gazebo
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - USER=${USER}
      - HOST_USER_UID=${USER_UID}
      - HOST_USER_GID=${USER_GID}
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /home/rbonghi/.Xauthority:/home/admin/.Xauthority:rw
    profiles:
      - "gazebo"

  nanosaur_simulator:
    image: nanosaur/simulation
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - USER=${USER}
      - HOST_USER_UID=${USER_UID}
      - HOST_USER_GID=${USER_GID}
    command: >
      ros2 launch nanosaur_${SIMULATION} nanosaur_bridge.launch.py ${COMMANDS}
    network_mode: host
    ipc: host
    volumes:
      - /etc/localtime:/etc/localtime:ro

  isaacsim:
    image: nanosaur/simulation:isaacsim
    container_name: isaacsim
    runtime: nvidia
    environment:
      - ACCEPT_EULA=Y
      - PRIVACY_CONSENT=Y
      - HOST_USER_UID=${UID}
      - HOST_USER_GID=${GID}
      - ROS_DOMAIN_ID=0
      - USER=${USER}
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${NANOSAUR_HOME}/isaac-sim-cache/cache/kit:/isaac-sim/kit/cache:rw
      - ${NANOSAUR_HOME}/isaac-sim-cache/cache/ov:/home/ubuntu/.cache/ov:rw
      - ${NANOSAUR_HOME}/isaac-sim-cache/cache/pip:/home/ubuntu/.cache/pip:rw
      - ${NANOSAUR_HOME}/isaac-sim-cache/cache/glcache:/home/ubuntu/.cache/nvidia/GLCache:rw
      - ${NANOSAUR_HOME}/isaac-sim-cache/cache/computecache:/home/ubuntu/.nv/ComputeCache:rw
      - ${NANOSAUR_HOME}/isaac-sim-cache/logs:/home/ubuntu/.nvidia-omniverse/logs:rw
      - ${NANOSAUR_HOME}/isaac-sim-cache/data:/home/ubuntu/.local/share/ov/data:rw
      - ${NANOSAUR_HOME}/isaac-sim-cache/documents:/home/ubuntu/Documents:rw
    profiles:
      - "gazebo"