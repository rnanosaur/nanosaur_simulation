
services:
  nanosaur_gazebo:
    image: nanosaur/gazebo
    environment:
      - DISPLAY=${DISPLAY}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - USER=${USER}
      - HOST_USER_UID=${USER_UID}
      - HOST_USER_GID=${USER_GID}
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /home/rbonghi/.Xauthority:/home/admin/.Xauthority:rw

  nanosaur_simulator:
    image: nanosaur/simulation
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - USER=${USER}
      - HOST_USER_UID=${USER_UID}
      - HOST_USER_GID=${USER_GID}
    command: >
      ros2 launch nanosaur_${SIMULATION} nanosaur_bridge.launch.py ${COMMANDS}
    network_mode: host
    ipc: host
    volumes:
      - /etc/localtime:/etc/localtime:ro